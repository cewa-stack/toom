services:
  comcio-assistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: comcio-assistant
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
